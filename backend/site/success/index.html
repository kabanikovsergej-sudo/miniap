<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <title>Оплата успешна</title>
    <style>
        body {
            background: #0b0b0f;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .box {
            background: #14141b;
            padding: 32px;
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .key {
            background: #0b0b0f;
            padding: 12px;
            border-radius: 10px;
            margin-top: 16px;
            font-family: monospace;
            font-size: 16px;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>✅ Оплата прошла успешно</h2>
        <p>Ваш ключ:</p>
        <div class="key" id="key">Получаем ключ...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get("session_id");

        if (!sessionId) {
            document.getElementById("key").textContent = "Ошибка: нет session_id";
        } else {
            fetch("https://resale-helper-app.onrender.com/api/claim/stripe?session_id=" + sessionId)
                .then(r => r.json())
                .then(data => {
                    if (data.key) {
                        document.getElementById("key").textContent = data.key;
                    } else {
                        document.getElementById("key").textContent = "Ключ не найден";
                    }
                })
                .catch(() => {
                    document.getElementById("key").textContent = "Ошибка сервера";
                });
        }
    </script>
</body>

</html>
