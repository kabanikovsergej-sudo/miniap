<!DOCTYPE html>
<html lang="ru" class="js-preload">

<head>
  <meta charset="utf-8" />
  <title>NightcoreX — Оплата</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link href="/style.css" rel="stylesheet" />
</head>

<body>
  <canvas id="stars"></canvas>

  <main class="page enter">
    <section class="pay-wrap">
      <div class="pay-top">
        <button class="pay-back" id="backBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
          Назад
        </button>

        <div class="pay-brand">
          <span class="brand-text">Nightcore<span class="brand-accent">X</span></span>
          <div class="tiny muted">Secure checkout</div>
        </div>
      </div>

      <div class="pay-summary">
        <div class="sum-left">
          <div class="sum-kicker muted">Вы выбрали</div>
          <div class="sum-title" id="planTitle">План</div>
          <div class="sum-hint tiny muted" id="planHint">—</div>
        </div>
        <div class="sum-right">
          <div class="sum-price" id="planPrice">$0.00</div>
          <div class="sum-badge">Выбор региона</div>
        </div>
      </div>

      <div class="pay-grid">
        <button class="pay-method recommended" type="button" data-region="us">
  <div class="pm-ico">
    <img src="/subscription/flags/US.svg" alt="US" />
  </div>
  <div class="pm-main">
    <div class="pm-title">США & Мир</div>
    <div class="pm-sub muted">Stripe • Apple Pay • Google Pay</div>
  </div>
  <div class="pm-go">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 6l6 6-6 6"/>
    </svg>
  </div>
</button>

<!-- УКРАИНА -->
<button class="pay-method" type="button" data-region="ua">
  <div class="pm-ico">
    <img src="/subscription/flags/UA.svg" alt="UA" />
  </div>
  <div class="pm-main">
    <div class="pm-title">Украина</div>
    <div class="pm-sub muted">Любые карты Украины (Stripe)</div>
  </div>
  <div class="pm-go">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 6l6 6-6 6"/>
    </svg>
  </div>
</button>

<!-- РОССИЯ -->
<button class="pay-method" type="button" data-region="ru">
  <div class="pm-ico">
    <img src="/subscription/flags/RU.svg" alt="RU" />
  </div>
  <div class="pm-main">
    <div class="pm-title">Россия</div>
    <div class="pm-sub muted">Lava • СБП • Карты РФ</div>
  </div>
  <div class="pm-go">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 6l6 6-6 6"/>
    </svg>
  </div>
</button>
      </div>

      <div class="pay-trust">
        <div class="trust-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          SSL Защита
        </div>
        <div class="trust-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Безопасная оплата
        </div>
      </div>
    </section>
  </main>

  <style>
    /* Переменные из твоего style.css */
    :root {
      --accent-blue: #6ea5ff;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    .pay-wrap {
      width: min(1000px, 94vw);
      margin: 40px auto;
    }

    /* Навигация */
    .pay-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .pay-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.02);
      color: #a7a7b3; /* var(--muted) */
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .pay-back:hover {
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      transform: translateX(-4px);
    }

    .pay-back svg { width: 16px; height: 16px; }

    /* Блок чека */
    .pay-summary {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 32px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(20px);
      margin-bottom: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .sum-title {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(to bottom, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sum-price {
      font-size: 30px;
      font-weight: 900;
      color: var(--cyan);
    }

    .sum-badge {
      font-size: 11px;
      padding: 4px 10px;
      background: rgba(0, 229, 255, 0.1);
      color: var(--cyan);
      border-radius: 99px;
      border: 1px solid rgba(0, 229, 255, 0.2);
    }

    /* Сетка методов */
    .pay-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
    }

    .pay-method {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .pay-method:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(110, 165, 255, 0.3);
      transform: translateY(-4px);
    }

    /* Флаги */
    .pm-ico {
      width: 48px;
      height: 34px;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .pm-ico {
  width: 52px;              /* было 48 */
  height: 36px;             /* ровно под флаг */
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,.14);
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Флаг SVG / IMG */
.pm-ico img {
  width: 100%;
  height: 100%;
  object-fit: cover;        /* 🔥 главное */
  display: block;
}

/* Лёгкий премиум-объём */
.pay-method:hover .pm-ico {
  box-shadow:
    0 0 0 1px rgba(110,165,255,.25),
    0 10px 30px rgba(0,0,0,.6);
}

    .pm-title { font-weight: 700; color: #fff; margin-bottom: 2px; }
    .pm-sub { font-size: 12px; }

    .pm-go {
      margin-left: auto;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: 0.2s;
    }

    .pay-method:hover .pm-go {
      background: var(--cyan);
      color: #000;
    }

    .pay-trust {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 32px;
      opacity: 0.4;
      font-size: 12px;
    }
    .trust-item { display: flex; align-items: center; gap: 8px; }
    .trust-item svg { width: 16px; height: 16px; }

    @media (max-width: 650px) {
      .pay-summary { flex-direction: column; text-align: center; gap: 12px; }
      .sum-right { text-align: center; }
    }
  </style>

  <script>
    // Эффект подсвечивания при движении мыши (Spotlight)
    document.querySelectorAll('.pay-method').forEach(btn => {
      btn.addEventListener('mousemove', e => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        btn.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(110, 165, 255, 0.15), rgba(255, 255, 255, 0.04))`;
      });
      btn.addEventListener('mouseleave', () => {
        btn.style.background = '';
      });
    });
  </script>

  <script src="/main.js"></script>
  <script src="../pay-config.js"></script>
  <script src="../pay.js"></script>
</body>
</html>
